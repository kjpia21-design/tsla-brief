<style>
  /* Tesla Brief!ng — 어닝콜 특별 페이지 (article-template.html 토큰·chrome 그대로 재사용, 2026-07)
   *  본문 섹션만 어닝 전용(.ea-*)으로 확장. 카테고리 = 항상 stock(레드 액센트). */
  :root{
    --bg:#ffffff; --canvas:#e9ebee; --soft:#f4f6f8;
    --line:#e8ecf0; --line-mute:#eef1f4;
    --ink:#191f28; --ink-mid:#4e5968; --ink-mute:#8b95a1;
    --red:#E31937;
    --up:#16A34A; --dn:#EF4444;
    /* 출처 등급 점 */
    --c-sec:#16A34A; --c-official:#8B5CF6; --c-press:#0EA5A4; --c-rumor:#9AA1AC;
  }
  /* 카테고리 색(칩·강조·CTA) — 카드와 동일 톤. 어닝 페이지는 항상 stock. */
  .is-stock{--cat:#D31430;--cat-soft:rgba(227,25,55,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--canvas);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.7;font-size:16px;letter-spacing:-.02em;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img,svg,object{display:block;max-width:100%}
  .page{max-width:440px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 32px rgba(0,0,0,.06)}
  .wrap{padding:0 20px}

  /* nav */
  .nav{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-mute)}
  .nav__inner{display:flex;align-items:center;justify-content:space-between;height:57px;padding:0 16px}
  .brand{display:inline-flex;align-items:baseline;gap:5px;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand__block{color:var(--red);font-weight:800}
  .brand__text{color:var(--ink);font-weight:800}
  .brand__text em{color:var(--red);font-style:normal}
  .nav__back{font-size:12px;font-weight:700;color:var(--ink-mid);padding:7px 13px;border:1px solid var(--line);border-radius:999px;background:var(--bg)}

  /* article shell */
  article{padding:22px 0 26px}

  /* ── 히어로 ── */
  .ea__hero{padding-top:0}
  .ea__eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--cat,var(--red));text-transform:uppercase}
  .ea__title{font-size:24px;font-weight:800;line-height:1.32;letter-spacing:-.02em;margin:12px 0 0;color:var(--ink);word-break:keep-all}
  .ea-verdict{display:inline-block;margin-top:10px;font-size:12px;font-weight:800;padding:4px 11px;border-radius:999px}
  .ea-verdict.is-beat{color:var(--up);background:rgba(22,163,74,.12)}
  .ea-verdict.is-miss{color:var(--dn);background:rgba(239,68,68,.12)}
  .ea-verdict.is-mixed{color:var(--ink-mid);background:var(--soft)}
  .ea__lead{font-size:16px;line-height:1.66;color:var(--ink);font-weight:600;margin:16px 0 0;
    padding:0 0 0 14px;border-left:3px solid var(--cat,var(--red));word-break:keep-all}
  .ea__schedule{font-size:12.5px;color:var(--ink-mute);font-weight:600;margin-top:14px;font-variant-numeric:tabular-nums}

  /* ── 섹션 공통 ── */
  .ea-sec{margin-top:28px}
  .ea-sec__h{font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--ink);margin:0 0 12px}

  /* ── KPI 그리드(2열) ── */
  .ea-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ea-kpi{background:var(--soft);border-radius:14px;padding:14px 15px;display:flex;flex-direction:column;gap:4px}
  .ea-kpi__label{font-size:11.5px;color:var(--ink-mute);font-weight:700;word-break:keep-all}
  .ea-kpi__value{font-size:21px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .ea-kpi__row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .ea-kpi__cons{font-size:10.5px;color:var(--ink-mute);font-weight:600}
  .ea-kpi__delta{font-size:11px;font-weight:800;padding:1.5px 7px;border-radius:6px}
  .ea-kpi__delta.is-beat{color:var(--up);background:rgba(22,163,74,.12)}
  .ea-kpi__delta.is-miss{color:var(--dn);background:rgba(239,68,68,.12)}
  .ea-kpi__yoy{font-size:10.5px;color:var(--ink-mute);font-weight:600}

  /* ── 세그먼트 ── */
  .ea-seg + .ea-seg{margin-top:16px}
  .ea-seg__h{font-size:14px;font-weight:800;color:var(--ink);margin:0 0 5px}
  .ea-seg__body{font-size:14.5px;color:var(--ink-mid);line-height:1.7;word-break:keep-all}

  /* ── 콜 핵심 발언(인용) ── */
  .ea-quote{border-left:3px solid var(--red);padding:2px 0 2px 14px;margin-top:16px}
  .ea-quote:first-child{margin-top:0}
  .ea-quote__text{font-size:15px;color:var(--ink);line-height:1.62;font-weight:600;word-break:keep-all;font-style:normal}
  .ea-quote__meta{display:block;margin-top:6px;font-size:11.5px;color:var(--ink-mute);font-weight:600;font-style:normal}

  /* ── 리스트(가이던스·관전포인트) ── */
  .ea-list{list-style:none;display:flex;flex-direction:column;gap:10px}
  .ea-list li{position:relative;padding-left:16px;font-size:14.5px;color:var(--ink-mid);line-height:1.62;word-break:keep-all}
  .ea-list li::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--cat,var(--red))}

  /* ── 투자자·언론 사전 질문 ── */
  .ea-q{position:relative;padding-left:27px}
  .ea-q + .ea-q{margin-top:14px}
  .ea-q__n{position:absolute;left:0;top:1px;font-size:12.5px;font-weight:800;color:var(--cat,var(--red));font-variant-numeric:tabular-nums}
  .ea-q__text{font-size:14.5px;color:var(--ink);line-height:1.62;font-weight:600;word-break:keep-all}
  .ea-q__who{display:block;margin-top:4px;font-size:11.5px;color:var(--ink-mute);font-weight:600}

  /* ── 통계 행(시장반응·컨센서스) ── */
  .ea-stats{display:flex;gap:10px;flex-wrap:wrap}
  .ea-stat{flex:1;min-width:120px;background:var(--soft);border-radius:14px;padding:12px 14px}
  .ea-stat__l{display:block;font-size:11px;color:var(--ink-mute);font-weight:700;margin-bottom:3px}
  .ea-stat__v{display:block;font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .ea-market__body,.ea-consensus__note{margin-top:10px;font-size:14px;color:var(--ink-mid);line-height:1.68;word-break:keep-all}

  /* ── 원문 소스 ── */
  .ea-src__list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .ea-src__item{display:block;font-size:13.5px;font-weight:700;color:var(--ink-mid);background:var(--soft);border-radius:12px;padding:11px 14px}
  .ea-src__btns{display:flex;gap:8px;flex-wrap:wrap}

  /* 원본 박스 스타일(article 재사용) — 웹캐스트/덱 버튼에 사용 */
  .art__source__cta{display:inline-flex;font-size:13px;font-weight:800;padding:11px 16px;border-radius:12px;background:var(--cat,var(--red));color:#fff;white-space:nowrap}
  .art__source__cta::after{content:" ↗"}

  /* 공유 버튼 */
  .art__share{margin-top:24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .art__share__label{font-size:10.5px;font-weight:800;letter-spacing:.1em;color:var(--ink-mute);text-transform:uppercase;margin-right:2px}
  .art__share__btn{display:inline-flex;align-items:center;gap:6px;padding:9px 13px;border-radius:999px;background:var(--soft);border:1px solid var(--line);color:var(--ink-mid);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1}
  .art__share__btn:hover{color:var(--ink);border-color:var(--ink-mute)}
  .art__share__btn.copied{color:var(--up);border-color:var(--up)}

  .art__disclaimer{margin-top:22px;color:var(--ink-mute);font-size:11.5px;line-height:1.7}
  .art__disclaimer b{color:var(--ink-mid);font-weight:700}

  /* 데스크톱 — 가독 폭 + 모바일 탭바 숨김 */
  @media (min-width:1080px){
    .page{max-width:620px}
    .tabbar{display:none}
    footer{padding-bottom:30px}
  }

  /* footer + 탭바 — 메인과 동일 */
  footer{padding:22px 0 96px;text-align:center;color:var(--ink-mute)}
  .footer__inner{font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.7}
  .footer__inner a{color:var(--ink-mid);font-weight:600}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;display:flex;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 0 14px;z-index:40}
  .tabbar a{flex:1;text-align:center;font-size:10.5px;color:var(--ink-mute);font-weight:700}
  .tabbar .ic{display:block;font-size:19px;line-height:1.3;height:25px}
  .tabbar .ic svg{vertical-align:middle;display:inline}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>

<script>
(() => {
  const url = location.origin + location.pathname.replace(/\.html$/, '');
  const title = document.title;
  const x = document.querySelector('[data-share-x]');
  if (x) x.href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(title) + '&url=' + encodeURIComponent(url);
  const tg = document.querySelector('[data-share-tg]');
  if (tg) tg.href = 'https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(title);
  const cp = document.querySelector('[data-share-copy]');
  if (cp) cp.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(url); }
    catch (e) { const i = document.createElement('input'); i.value = url; document.body.appendChild(i); i.select(); document.execCommand('copy'); i.remove(); }
    const s = cp.querySelector('span'); const orig = s.textContent;
    cp.classList.add('copied');
    s.textContent = (document.documentElement.lang === 'en') ? 'Copied!' : '복사됨!';
    setTimeout(() => { cp.classList.remove('copied'); s.textContent = orig; }, 1600);
  });
})();
</script>
