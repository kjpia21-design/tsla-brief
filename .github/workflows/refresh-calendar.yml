name: Refresh investor calendar

# 월 1회 투자자 캘린더 추정치 롤포워드.
# 외부 HTTP 없음 — scripts/refresh-calendar.mjs 가 과거 패턴으로 다음 분기 일정을 굴려 채운다.
# 지나간 일정은 빠지고 다음 분기가 들어옴. 공식 확정일(tentative:false)은 key 로 보존.
# calendar.json 이 실제로 바뀔 때만 commit → Cloudflare Pages 재빌드 (월 ~1회).

on:
  schedule:
    - cron: "17 20 1 * *"  # 매월 1일 20:17 UTC = 2일 05:17 KST
  workflow_dispatch:        # 수동 트리거 가능

permissions:
  contents: write

concurrency:
  group: refresh-calendar
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Roll forward calendar estimates
        run: node scripts/refresh-calendar.mjs

      - name: Commit & push if calendar changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "GitHub Actions Calendar Bot"
          git add data/calendar.json
          if git diff --cached --quiet; then
            echo "[skip] no calendar changes"
          else
            git commit -m "calendar: 투자자 일정 롤포워드 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin master
          fi
