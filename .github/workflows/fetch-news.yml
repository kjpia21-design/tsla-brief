name: Auto-fetch RSS

# 2시간마다 RSS 페치 → raw-cards.json 변경 시 자동 commit/push.
# 정제(cards.json)는 별도로 Cloud Routine 이 raw-cards.json 보고 처리.
# GitHub Actions 환경의 IP 는 RSS 측에서 차단되지 않음 (Routine = 차단됨).

on:
  schedule:
    - cron: "0 */2 * * *"  # 매 짝수 시 정각 UTC (2시간 간격, 월 360회)
  workflow_dispatch:        # 수동 트리거 가능

permissions:
  contents: write           # commit & push 권한

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch RSS (실패해도 다음 단계로 — 기존 raw 유지)
        run: node scripts/fetch-news.mjs
        continue-on-error: true

      - name: Commit & push if raw-cards.json changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "GitHub Actions Fetch Bot"
          git add data/raw-cards.json
          if git diff --cached --quiet; then
            echo "[skip] no raw changes"
          else
            git commit -m "raw: 자동 페치 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin master
          fi
