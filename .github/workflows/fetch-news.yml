name: Auto-fetch RSS

# 2시간마다 RSS 페치 → raw-cards.json 변경 시 자동 commit/push.
# 정제(cards.json)는 별도로 Cloud Routine 이 raw-cards.json 보고 처리.
# GitHub Actions 환경의 IP 는 RSS 측에서 차단되지 않음 (Routine = 차단됨).

on:
  schedule:
    - cron: "0 */2 * * *"  # 매 짝수 시 정각 UTC (2시간 간격, 월 360회)
  workflow_dispatch:        # 수동 트리거 가능

permissions:
  contents: write           # commit & push 권한

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch RSS + X (실패해도 다음 단계로 — 기존 raw 유지)
        run: node scripts/fetch-news.mjs
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        continue-on-error: true

      - name: Commit & push if raw-cards.json changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "GitHub Actions Fetch Bot"
          git add data/raw-cards.json
          if git diff --cached --quiet; then
            echo "[skip] no raw changes"
          else
            git commit -m "raw: 자동 페치 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin master
          fi

      # Cloud Routine 이 매 실행마다 새 claude/* 브랜치를 origin 에 push.
      # 7일 이상 지난 거 자동 삭제 — branches 페이지 정리 (동작 영향 0).
      - name: Cleanup old claude/* branches (>7 days)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cutoff=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "[cleanup] cutoff = $cutoff"
          deleted=0
          for branch in $(gh api "/repos/${GITHUB_REPOSITORY}/branches" --paginate \
            --jq '.[] | select(.name | startswith("claude/")) | .name'); do
            commit_date=$(gh api "/repos/${GITHUB_REPOSITORY}/branches/${branch}" \
              --jq '.commit.commit.author.date' 2>/dev/null || echo "")
            if [ -z "$commit_date" ]; then
              echo "[skip] $branch — could not read commit date"
              continue
            fi
            if [[ "$commit_date" < "$cutoff" ]]; then
              echo "[delete] $branch (last commit $commit_date)"
              gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}" && deleted=$((deleted+1))
            else
              echo "[keep] $branch (last commit $commit_date)"
            fi
          done
          echo "[cleanup] done — $deleted branches deleted"
