<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="TSLA Brief mascot — Optimus head">
  <defs>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F4F5"/>
      <stop offset="100%" stop-color="#C8C9CD"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0F12"/>
      <stop offset="100%" stop-color="#1F2126"/>
    </linearGradient>
    <linearGradient id="visorGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E31937" stop-opacity="0.0"/>
      <stop offset="30%" stop-color="#E31937" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#FF5566" stop-opacity="1"/>
      <stop offset="70%" stop-color="#E31937" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E31937" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- ground subtle shadow -->
  <ellipse cx="100" cy="178" rx="50" ry="4" fill="#000" opacity="0.35"/>

  <!-- antenna -->
  <line x1="100" y1="30" x2="100" y2="18" stroke="#B8B8C0" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="100" cy="16" r="3" fill="#E31937"/>
  <circle cx="100" cy="16" r="6" fill="#E31937" opacity="0.22"/>

  <!-- head outer (rounded rectangle, slightly squarish) -->
  <path d="M 56 50 Q 56 30 80 30 L 120 30 Q 144 30 144 50 L 144 134 Q 144 158 120 158 L 80 158 Q 56 158 56 134 Z"
        fill="url(#headGrad)" stroke="#9A9CA2" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- side plates / ear bumps -->
  <rect x="50" y="78" width="10" height="34" rx="3" fill="#D8D9DD" stroke="#9A9CA2" stroke-width="1"/>
  <rect x="140" y="78" width="10" height="34" rx="3" fill="#D8D9DD" stroke="#9A9CA2" stroke-width="1"/>

  <!-- face plate inset (dark) -->
  <path d="M 68 56 Q 68 48 76 48 L 124 48 Q 132 48 132 56 L 132 128 Q 132 138 122 138 L 78 138 Q 68 138 68 128 Z"
        fill="url(#faceGrad)" stroke="#2A2D33" stroke-width="1"/>

  <!-- visor LED line (red bar) -->
  <rect x="74" y="84" width="52" height="10" rx="5" fill="#0A0A0B"/>
  <rect x="76" y="86" width="48" height="6" rx="3" fill="url(#visorGlow)"/>
  <!-- two pinpoint "eyes" within the visor for character -->
  <circle cx="86" cy="89" r="1.8" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="114" cy="89" r="1.8" fill="#FFFFFF" opacity="0.95"/>

  <!-- chin sensor dot -->
  <circle cx="100" cy="122" r="2.2" fill="#E31937"/>
  <circle cx="100" cy="122" r="5" fill="#E31937" opacity="0.2"/>

  <!-- neck collar -->
  <rect x="78" y="158" width="44" height="10" rx="2" fill="#9A9CA2" stroke="#707078" stroke-width="1"/>
  <rect x="84" y="162" width="32" height="2" fill="#5A5C62"/>

  <!-- tiny signature -->
  <text x="100" y="192" text-anchor="middle" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="9" font-weight="600" letter-spacing="2" fill="#707078">TSLA · BRIEF</text>
</svg>
