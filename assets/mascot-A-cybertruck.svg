<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="TSLA Brief mascot — Cybertruck silhouette">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2126"/>
      <stop offset="100%" stop-color="#0E0F12"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2D33"/>
      <stop offset="100%" stop-color="#15171B"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3A4E" stop-opacity="1"/>
      <stop offset="60%" stop-color="#E31937" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E31937" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground subtle shadow -->
  <ellipse cx="100" cy="168" rx="62" ry="5" fill="#000" opacity="0.35"/>

  <!-- cybertruck body, single wedge silhouette -->
  <path d="M 32 130 L 60 96 L 132 80 L 168 116 L 168 138 Q 168 146 160 146 L 40 146 Q 32 146 32 138 Z"
        fill="url(#bodyGrad)" stroke="#3A3D45" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- top angled cabin glass -->
  <path d="M 70 100 L 122 86 L 148 110 L 70 110 Z"
        fill="url(#glassGrad)" stroke="#3A3D45" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- LED headlight bar (red) -->
  <rect x="42" y="120" width="46" height="3" rx="1.5" fill="url(#eyeGlow)"/>
  <rect x="42" y="120" width="46" height="1.4" rx="0.7" fill="#FF6A7A" opacity="0.9"/>

  <!-- door split line -->
  <line x1="105" y1="110" x2="105" y2="142" stroke="#2A2D33" stroke-width="1" opacity="0.7"/>

  <!-- wheels -->
  <g>
    <circle cx="68" cy="150" r="14" fill="#0A0A0B" stroke="#3A3D45" stroke-width="1.4"/>
    <circle cx="68" cy="150" r="6" fill="#1F2126" stroke="#4A4D55" stroke-width="0.8"/>
    <circle cx="68" cy="150" r="1.6" fill="#E31937"/>
  </g>
  <g>
    <circle cx="142" cy="150" r="14" fill="#0A0A0B" stroke="#3A3D45" stroke-width="1.4"/>
    <circle cx="142" cy="150" r="6" fill="#1F2126" stroke="#4A4D55" stroke-width="0.8"/>
    <circle cx="142" cy="150" r="1.6" fill="#E31937"/>
  </g>

  <!-- antenna -->
  <line x1="100" y1="80" x2="100" y2="68" stroke="#B8B8C0" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="100" cy="66" r="2.6" fill="#E31937"/>
  <circle cx="100" cy="66" r="5" fill="#E31937" opacity="0.25"/>

  <!-- tiny signature -->
  <text x="100" y="190" text-anchor="middle" font-family="ui-monospace, 'IBM Plex Mono', monospace" font-size="9" font-weight="600" letter-spacing="2" fill="#707078">TSLA · BRIEF</text>
</svg>
