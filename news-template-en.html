<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>All News — TESLA Brief!ng</title>
<meta name="description" content="Tesla Brief!ng — all news cards, sorted by latest.">
<link rel="alternate" hreflang="ko" href="https://teslabriefing.com/news.html">
<link rel="alternate" hreflang="en" href="https://teslabriefing.com/en/news.html">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="apple-touch-icon" href="/assets/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:title" content="All News — TESLA Brief!ng">
<meta property="og:image" content="https://teslabriefing.com/assets/og-image.svg">
<style>
  :root{
    --bg:#0A0A0B; --bg-2:#111114; --bg-3:#181820;
    --bg-grad:radial-gradient(1200px 600px at 80% -10%, rgba(227,25,55,.10), transparent 60%),
              radial-gradient(900px 500px at 10% 10%, rgba(27,108,255,.05), transparent 60%);
    --line:#2A2A33; --line-mute:#1E1E26;
    --ink:#F4F4F5; --ink-mid:#D4D4DC; --ink-mute:#9494A0;
    --tesla-red:#E31937; --red-deep:#A30E25;
    --c-stock:#E31937; --c-product:#1B6CFF; --c-fsd:#22D3EE; --c-musk:#F59E0B;
    --max-w:1200px; --gutter:clamp(16px,4vw,56px);
    --r-md:12px; --r-lg:18px; --r-pill:999px;
    --shadow-sm:0 2px 6px rgba(0,0,0,.35);
    --ease:cubic-bezier(.2,.7,.2,1);
    --t-1:180ms; --t-2:260ms;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg) var(--bg-grad);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased;
    padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  }
  a{color:inherit;text-decoration:none}
  img,svg,object{display:block;max-width:100%}
  .wrap{max-width:var(--max-w);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}

  /* nav */
  .nav{position:sticky;top:0;z-index:50;background:rgba(10,10,11,.82);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line-mute)}
  .nav__inner{display:flex;align-items:center;justify-content:space-between;height:56px}
  /* SPLIT BLOCK 로고 */
  .brand{display:inline-flex;align-items:center;gap:8px;text-decoration:none}
  .brand__block{
    display:inline-flex;align-items:center;justify-content:center;
    background:var(--tesla-red);color:#fff;
    padding:4px 8px;border-radius:5px;
    font-family:"Inter",ui-monospace,monospace;font-weight:900;font-size:12px;
    letter-spacing:.6px;line-height:1;flex-shrink:0;
  }
  .brand__text{
    font-family:"Inter",ui-monospace,monospace;font-weight:700;font-size:18px;
    color:#D4D4DC;letter-spacing:-0.005em;line-height:1;font-style:italic;
    white-space:nowrap;
  }
  .brand__text em{color:var(--tesla-red);font-style:italic;font-weight:700}
  .nav__back{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;color:var(--ink-mid);padding:8px 14px;border:1px solid var(--line);border-radius:var(--r-pill);transition:color var(--ease),border-color var(--ease)}
  .nav__back:hover{color:var(--ink);border-color:var(--ink-mid)}

  /* page head */
  .page-head{padding:28px 0 18px}
  .page-head__eyebrow{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:10.5px;letter-spacing:.22em;color:var(--tesla-red);text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;gap:8px}
  .page-head__eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--tesla-red);box-shadow:0 0 10px var(--tesla-red)}
  .page-head h1{font-size:clamp(28px,5vw,38px);font-weight:700;letter-spacing:-0.005em;color:#B8B8C0;margin:14px 0 4px;line-height:1.2}
  .page-head__sub{color:var(--ink-mute);font-size:13px;font-family:"IBM Plex Mono",ui-monospace,monospace;letter-spacing:.04em}
  .cats__fresh{display:inline-block;font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;color:var(--ink-mid);font-weight:600;letter-spacing:.02em}

  /* cards grid (home 의 .ccard 스타일 그대로) */
  .cats__grid{display:grid;grid-template-columns:1fr;gap:12px;padding:14px 0 56px}
  .ccard{
    position:relative;background:var(--bg-2);border:1px solid var(--line);
    border-radius:var(--r-md);padding:13px 14px 11px;
    display:flex;flex-direction:column;gap:8px;overflow:hidden;
    transition:transform var(--t-2) var(--ease),border-color var(--t-2) var(--ease),box-shadow var(--t-2) var(--ease),background var(--t-2) var(--ease);
  }
  .ccard::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--cat-color,var(--tesla-red));opacity:.85}
  .ccard:hover{transform:translateY(-1px);background:var(--bg-3);border-color:var(--cat-color,var(--tesla-red));box-shadow:var(--shadow-sm)}
  .ccard__top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .ccard__cat{display:inline-flex;align-items:center;gap:7px;font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:9.5px;letter-spacing:.18em;color:var(--ink-mid);font-weight:600}
  .ccard__cat::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--cat-color,var(--tesla-red));box-shadow:0 0 8px var(--cat-color,var(--tesla-red))}
  .ccard__time{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:10px;color:var(--ink-mute);white-space:nowrap}
  .ccard h3{font-size:15px;font-weight:700;line-height:1.34;letter-spacing:-0.01em;margin:2px 0 0;color:var(--ink);word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ccard h3 em{font-style:italic;font-family:"Inter",ui-monospace,monospace;color:var(--cat-color,var(--tesla-red));font-weight:600}
  .ccard__body{color:var(--ink-mid);font-size:12.5px;margin:0;line-height:1.5;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .ccard__meta{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:auto;padding-top:6px;border-top:1px dashed var(--line);flex-wrap:nowrap}
  .src{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:10px;color:var(--ink-mute);display:flex;gap:8px;min-width:0}
  .src .d{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
  .src .d-sec{background:#16A34A} .src .d-off{background:#1B6CFF} .src .d-press{background:#F59E0B} .src .d-rumor{background:#707078}
  .src-name{display:inline-flex;align-items:center;gap:6px;color:var(--ink-mid);font-weight:600;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .src-name .d{flex-shrink:0}
  .ccard__cta{display:inline-flex;align-items:center;gap:3px;color:var(--ink-mid);font-size:11px;font-weight:600;flex-shrink:0}
  .ccard__cta::after{content:"→"}
  .ccard.is-stock   { --cat-color: var(--c-stock); }
  .ccard.is-product { --cat-color: var(--c-product); }
  .ccard.is-fsd     { --cat-color: var(--c-fsd); }
  .ccard.is-musk    { --cat-color: var(--c-musk); }

  /* footer */
  footer{border-top:1px solid var(--line-mute);padding:32px 0 calc(24px + env(safe-area-inset-bottom));margin-top:24px;color:var(--ink-mute)}
  .footer__inner{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.04em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .footer__inner a{color:var(--ink-mid)}
  .footer__inner a:hover{color:var(--ink)}

  @media (min-width:768px){
    .cats__grid{grid-template-columns:repeat(2,1fr);gap:14px}
    .ccard{padding:16px 18px 14px;gap:10px}
    .ccard h3{font-size:16.5px;-webkit-line-clamp:3}
    .ccard__body{font-size:13px;-webkit-line-clamp:3}
  }
  @media (min-width:1100px){
    .cats__grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>

<header class="nav">
  <div class="wrap nav__inner">
    <a class="brand" href="index.html" aria-label="Tesla Brief!ng — Home">
      <span class="brand__block">TESLA</span>
      <span class="brand__text">Brief<em>!ng</em></span>
    </a>
    <a class="nav__back" href="index.html">← Back to home</a>
  </div>
</header>

<section class="page-head wrap">
  <span class="page-head__eyebrow">NEWS · sorted by latest</span>
  <h1>All News</h1>
  <p class="page-head__sub"><!-- BLOCK:NEWS_TIME -->as of — N items<!-- /BLOCK:NEWS_TIME --></p>
</section>

<section class="wrap">
  <div class="cats__grid">
    <!-- BLOCK:NEWS_GRID --><a class="ccard is-stock" href="#"><div class="ccard__top"><span class="ccard__cat">STOCK</span><span class="ccard__time">—</span></div><h3>Loading…</h3></a><!-- /BLOCK:NEWS_GRID -->
  </div>
</section>

<footer>
  <div class="wrap footer__inner">
    <span>© 2026 TESLA BRIEF!NG · NOT INVESTMENT ADVICE</span>
    <span><a href="index.html">← Back to home</a></span>
  </div>
</footer>


<script>
// Dynamic time refresh — same logic as home.html (card time + freshness label)
(() => {
  function fmtRel(iso) {
    const t = Date.parse(iso);
    if (Number.isNaN(t)) return "";
    const diffSec = Math.round((Date.now() - t) / 1000);
    if (diffSec < 60) return "just now";
    const diffMin = Math.round(diffSec / 60);
    if (diffMin < 60) return `${diffMin}m ago`;
    const diffHr = Math.round(diffMin / 60);
    if (diffHr < 24) return `${diffHr}h ago`;
    return `${Math.round(diffHr / 24)}d ago`;
  }
  function fmtFresh(iso) {
    const t = Date.parse(iso);
    if (Number.isNaN(t)) return "";
    const diffMin = Math.max(1, Math.round((Date.now() - t) / 60000));
    if (diffMin < 60) return `latest content ${diffMin}m ago`;
    const diffHr = Math.round(diffMin / 60);
    if (diffHr < 24) return `latest content ${diffHr}h ago`;
    return `latest content ${Math.round(diffHr / 24)}d ago`;
  }
  function tick() {
    document.querySelectorAll('[data-pubdate]').forEach((el) => {
      const iso = el.getAttribute('data-pubdate');
      if (iso) el.textContent = fmtRel(iso);
    });
    document.querySelectorAll('[data-fresh-since]').forEach((el) => {
      const iso = el.getAttribute('data-fresh-since');
      if (iso) el.textContent = fmtFresh(iso);
    });
  }
  tick();
  setInterval(tick, 60_000);
})();
</script>

</body>
