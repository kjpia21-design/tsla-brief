<style>
  /* Tesla Brief!ng — 기사 상세 (토스형 시스템 통일, 2026-06)
   *  메인·전체뉴스와 동일: 440px 모바일 칼럼 · Pretendard 단일 · 라이트 흰 리딩면 · 하단 탭바
   *  카테고리 컬러 = 칩·강조·CTA 액센트만. 등락색은 미국식. */
  :root{
    --bg:#ffffff; --canvas:#e9ebee; --soft:#f4f6f8;
    --line:#e8ecf0; --line-mute:#eef1f4;
    --ink:#191f28; --ink-mid:#4e5968; --ink-mute:#8b95a1;
    --red:#E31937;
    --up:#16A34A; --dn:#EF4444;
    /* 출처 등급 점 */
    --c-sec:#16A34A; --c-official:#8B5CF6; --c-press:#0EA5A4; --c-rumor:#9AA1AC;
  }
  /* 카테고리 색(칩·강조·CTA) — 카드와 동일 톤 */
  .is-stock{--cat:#D31430;--cat-soft:rgba(227,25,55,.08)}
  .is-product{--cat:#1B6CFF;--cat-soft:rgba(27,108,255,.08)}
  .is-fsd{--cat:#0E9CB8;--cat-soft:rgba(34,211,238,.12)}
  .is-musk{--cat:#D97706;--cat-soft:rgba(245,158,11,.12)}
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--canvas);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.7;font-size:16px;letter-spacing:-.02em;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img,svg,object{display:block;max-width:100%}
  .page{max-width:440px;margin:0 auto;background:var(--bg);min-height:100vh;box-shadow:0 0 32px rgba(0,0,0,.06)}
  .wrap{padding:0 20px}

  /* nav */
  .nav{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-mute)}
  .nav__inner{display:flex;align-items:center;justify-content:space-between;height:57px;padding:0 16px}
  .brand{display:inline-flex;align-items:baseline;gap:5px;font-weight:800;font-size:18px;letter-spacing:-.02em}
  .brand__block{color:var(--red);font-weight:800}
  .brand__text{color:var(--ink);font-weight:800}
  .brand__text em{color:var(--red);font-style:normal}
  .nav__back{font-size:12px;font-weight:700;color:var(--ink-mid);padding:7px 13px;border:1px solid var(--line);border-radius:999px;background:var(--bg)}

  /* article */
  article{padding:22px 0 26px}
  .art__cat{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.02em;color:var(--cat,var(--red));background:var(--cat-soft,rgba(227,25,55,.08));border-radius:6px;padding:3px 9px}
  .art__title{font-size:24px;font-weight:800;line-height:1.32;letter-spacing:-.02em;margin:13px 0 0;color:var(--ink);word-break:keep-all}
  .art__title em{font-style:normal;color:var(--cat,var(--red));font-weight:800}
  .art__meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:13px;padding:11px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:11.5px;color:var(--ink-mute);font-weight:600;font-variant-numeric:tabular-nums}
  .art__meta b{color:var(--ink-mid);font-weight:700}
  .art__meta .src-dot{display:inline-flex;align-items:center;gap:6px}
  .art__meta .src-dot i{width:7px;height:7px;border-radius:50%;display:inline-block}
  .art__meta .d-sec{background:var(--c-sec)} .art__meta .d-off{background:var(--c-official)}
  .art__meta .d-press{background:var(--c-press)} .art__meta .d-rumor{background:var(--c-rumor)}
  .art__confirmed{color:var(--c-sec);font-weight:700}
  .senti{font-size:10.5px;font-weight:800;padding:1.5px 7px;border-radius:6px;display:inline-flex;align-items:center}
  .senti--bull{color:var(--up);background:rgba(22,163,74,.13)}
  .senti--bear{color:var(--dn);background:rgba(239,68,68,.12)}

  /* lead + 본문 */
  .art__lead{font-size:16.5px;line-height:1.66;color:var(--ink);font-weight:600;margin:20px 0 18px;
    padding:0 0 0 14px;border-left:3px solid var(--cat,var(--red));word-break:keep-all}
  .art__summary p{margin:0 0 18px;color:var(--ink-mid);font-size:15.5px;line-height:1.78;word-break:keep-all}
  .art__summary p:last-child{margin-bottom:0}
  .art__summary em{color:var(--cat,var(--ink));font-style:normal;font-weight:700}

  /* 원본 박스 — 연회색 카드 */
  .art__source{margin-top:26px;padding:16px 18px;background:var(--soft);border-radius:16px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .art__source__meta{display:flex;flex-direction:column;gap:3px;min-width:0}
  .art__source__label{font-size:10px;letter-spacing:.12em;color:var(--ink-mute);text-transform:uppercase;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .art__source__label i{width:7px;height:7px;border-radius:50%;display:inline-block}
  .art__source__label .d-sec{background:var(--c-sec)} .art__source__label .d-off{background:var(--c-official)}
  .art__source__label .d-press{background:var(--c-press)} .art__source__label .d-rumor{background:var(--c-rumor)}
  .art__source__name{color:var(--ink);font-size:15px;font-weight:700;letter-spacing:-.01em}
  .art__source__cta{font-size:13px;font-weight:800;padding:11px 16px;border-radius:12px;background:var(--cat,var(--red));color:#fff;white-space:nowrap}
  .art__source__cta::after{content:" ↗"}
  .art__source__also{margin-top:12px;font-size:12.5px;color:var(--ink-mute);font-weight:600;line-height:1.6}

  /* 관련 기사 */
  .art__related{margin-top:30px}
  .art__related__h{font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--ink);margin:0 0 8px}
  .art__rel__item{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:13px 16px;margin-bottom:8px;background:var(--soft);border-radius:14px}
  .art__rel__t{color:var(--ink);font-size:14.5px;font-weight:600;line-height:1.45;word-break:keep-all}
  .art__rel__time{flex-shrink:0;font-size:11px;color:var(--ink-mute);font-weight:600;white-space:nowrap}

  .art__disclaimer{margin-top:22px;color:var(--ink-mute);font-size:11.5px;line-height:1.7}
  .art__disclaimer b{color:var(--ink-mid);font-weight:700}

  /* footer + 탭바 — 메인과 동일 */
  footer{padding:22px 0 96px;text-align:center;color:var(--ink-mute)}
  .footer__inner{font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.7}
  .footer__inner a{color:var(--ink-mid);font-weight:600}
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;display:flex;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:8px 0 14px;z-index:40}
  .tabbar a{flex:1;text-align:center;font-size:10.5px;color:var(--ink-mute);font-weight:700}
  .tabbar .ic{display:block;font-size:19px;line-height:1.3;height:25px}
  .tabbar .ic svg{vertical-align:middle;display:inline}
  :focus-visible{outline:2px solid var(--red);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
</style>
</head>
