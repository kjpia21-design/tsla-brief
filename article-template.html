<style>
  /* Tesla Briefing — 카드 상세 (LIGHT, READER MODE)
   * 홈은 다크, 본문 읽기 페이지는 라이트 — 신문/매거진 패턴.
   * 카테고리 액센트 컬러만 유지, 본문은 흰 배경 + 검정 글자로 가독성 극대화. */
  :root{
    --bg:#FFFFFF; --bg-2:#F6F6F8; --bg-3:#EDEDF1;
    --line:#E2E2E8; --line-mute:#EFEFF3;
    --ink:#0E0E12;       /* 본문 — 거의 검정 */
    --ink-mid:#3A3A42;   /* 보조 텍스트 */
    --ink-mute:#7A7A84;  /* 메타·날짜 */
    --tesla-red:#E31937; --red-deep:#A30E25;
    --c-stock:#E31937; --c-product:#1B6CFF; --c-fsd:#0BA9C2; --c-musk:#D97706;
    --c-sec:#16A34A; --c-official:#8B5CF6; --c-press:#0D9488; --c-rumor:#9CA3AF;
    --max-w:720px; --gutter:clamp(16px,4vw,40px);
    --r-md:12px; --r-lg:18px; --r-xl:24px; --r-pill:999px;
    --shadow-sm:0 1px 3px rgba(14,14,18,.06);
    --shadow-md:0 6px 20px -6px rgba(14,14,18,.12);
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);
    font-family:"Wanted Sans Variable","Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.7;font-size:16px;-webkit-font-smoothing:antialiased;
    padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
  }
  a{color:inherit;text-decoration:none}
  img,svg,object{display:block;max-width:100%}
  .wrap{max-width:var(--max-w);margin:0 auto;padding-left:var(--gutter);padding-right:var(--gutter)}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums}

  /* nav — 라이트 테마, 다크 홈으로 돌아가는 버튼 강조 */
  .nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line)}
  .nav__inner{display:flex;align-items:center;justify-content:space-between;height:56px}
  /* SPLIT BLOCK 로고 — 라이트 테마 variant (TSLA 빨강 박스 + Brief!ng italic 검정) */
  /* 워드마크 로고 — Tesla(red) + Brief!ng('!'만 red). 메인 페이지와 동일. */
  .brand{display:inline-flex;align-items:baseline;gap:5px;text-decoration:none}
  .brand__block{
    font-family:"Wanted Sans Variable","Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-weight:700;font-size:20px;
    color:var(--tesla-red);letter-spacing:-0.02em;line-height:1;flex-shrink:0;
  }
  .brand__text{
    font-family:"Wanted Sans Variable","Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-weight:800;font-size:20px;
    color:var(--ink);letter-spacing:-0.02em;line-height:1;font-style:normal;
    white-space:nowrap;
  }
  .brand__text em{color:var(--tesla-red);font-style:normal;font-weight:800}
  @media (min-width:768px){ .brand__block{font-size:17px} .brand__text{font-size:17px} }
  .nav__back{
    font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;color:var(--ink);font-weight:600;
    padding:8px 14px;border:1px solid var(--line);border-radius:var(--r-pill);
    background:var(--bg);transition:color var(--ease),border-color var(--ease),background var(--ease);
  }
  .nav__back:hover{border-color:var(--ink-mid);background:var(--bg-2)}

  /* article */
  article{padding:32px 0 64px}
  .art__cat{
    display:inline-flex;align-items:center;gap:9px;
    font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.22em;
    color:var(--cat-color,var(--tesla-red));font-weight:700;text-transform:uppercase;
  }
  .art__cat::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--cat-color,var(--tesla-red));box-shadow:0 0 10px rgba(0,0,0,.08)}
  .is-stock{--cat-color:var(--c-stock)}
  .is-product{--cat-color:var(--c-product)}
  .is-fsd{--cat-color:var(--c-fsd)}
  .is-musk{--cat-color:var(--c-musk)}

  .art__title{
    font-size:clamp(28px,5.5vw,40px);font-weight:800;line-height:1.22;
    letter-spacing:-0.015em;margin:18px 0 0;color:var(--ink);word-break:keep-all;
  }
  .art__title em{font-style:italic;color:var(--cat-color,var(--tesla-red));font-weight:700}

  .art__meta{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:18px;
    padding:14px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;
    color:var(--ink-mute);letter-spacing:.04em;
  }
  .art__meta b{color:var(--ink);font-weight:700}
  .art__meta .src-dot{display:inline-flex;align-items:center;gap:6px}
  /* 출처 마커는 둥근 사각형 — 원형 카테고리 표시와 구분 */
  .art__meta .src-dot i{width:8px;height:8px;border-radius:2px;display:inline-block}
  .art__meta .d-sec{background:var(--c-sec)}
  .art__meta .d-off{background:var(--c-official)}
  .art__meta .d-press{background:var(--c-press)}
  .art__meta .d-rumor{background:var(--c-rumor)}
  /* 교차검증(#1) */
  .art__confirmed{color:#16A34A;font-weight:700}
  .art__source__also{margin-top:10px;font-size:13px;color:var(--ink-mute);letter-spacing:.01em}
  /* 강세/약세 태그(#2) */
  .senti{font-size:11px;font-weight:700;letter-spacing:.02em;padding:1px 8px;border-radius:999px;display:inline-flex;align-items:center;vertical-align:middle}
  .senti--bull{color:#16A34A;background:rgba(22,163,74,.12)}
  .senti--bear{color:#DC2626;background:rgba(239,68,68,.10)}

  /* lead + summary */
  .art__lead{
    font-size:19px;line-height:1.6;color:var(--ink);
    margin:28px 0 20px;font-weight:500;letter-spacing:-0.005em;
    word-break:keep-all;
    padding:16px 20px;
    border-left:3px solid var(--cat-color,var(--tesla-red));
    background:color-mix(in srgb, var(--cat-color,var(--tesla-red)) 8%, #fff);
    border-radius:0 var(--r-md) var(--r-md) 0;
  }
  .art__summary{margin-top:14px}
  .art__summary p{
    margin:0 0 22px;color:var(--ink);font-size:17px;line-height:1.85;
    word-break:keep-all;letter-spacing:-0.003em;
  }
  .art__summary p:last-child{margin-bottom:0}
  .art__summary em{
    color:var(--cat-color,var(--ink));font-style:italic;
    font-weight:700;
  }

  /* 원본 박스 — 클릭 영역 명확, 카테고리 컬러 액센트 */
  .art__source{
    margin-top:32px;padding:18px 20px;
    background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);
    display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
    position:relative;overflow:hidden;
  }
  .art__source::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--cat-color,var(--tesla-red));opacity:.85}
  .art__source__meta{display:flex;flex-direction:column;gap:4px;min-width:0}
  .art__source__label{
    font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:10.5px;letter-spacing:.18em;
    color:var(--ink-mute);text-transform:uppercase;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;
  }
  .art__source__label i{width:8px;height:8px;border-radius:2px;display:inline-block}
  .art__source__label .d-sec{background:var(--c-sec)}
  .art__source__label .d-off{background:var(--c-official)}
  .art__source__label .d-press{background:var(--c-press)}
  .art__source__label .d-rumor{background:var(--c-rumor)}
  .art__source__name{color:var(--ink);font-size:17px;font-weight:700;letter-spacing:-0.01em}
  .art__source__cta{
    font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:13px;font-weight:700;
    padding:11px 18px;border-radius:var(--r-pill);
    background:var(--cat-color,var(--tesla-red));color:#fff;
    transition:transform var(--ease),background var(--ease),box-shadow var(--ease);
    white-space:nowrap;letter-spacing:.02em;
    box-shadow:0 2px 8px -2px rgba(0,0,0,.15);
  }
  .art__source__cta:hover{transform:translateY(-1px);box-shadow:0 4px 12px -2px rgba(0,0,0,.2)}
  .art__source__cta::after{content:" ↗";margin-left:4px}
  /* 관련 기사 (같은 카테고리 최근 글) */
  .art__related{margin-top:40px;padding-top:26px;border-top:1px solid var(--line)}
  .art__related__h{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--ink-mute);text-transform:uppercase;margin:0 0 4px}
  .art__rel__item{display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid var(--line-mute);text-decoration:none}
  .art__rel__item:hover .art__rel__t{color:var(--tesla-red)}
  .art__rel__t{color:var(--ink);font-size:16px;font-weight:600;line-height:1.45;word-break:keep-all;transition:color .15s}
  .art__rel__time{flex-shrink:0;font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:12px;color:var(--ink-mute);white-space:nowrap}

  .art__disclaimer{
    margin-top:22px;color:var(--ink-mute);font-size:12px;line-height:1.7;
    font-family:"IBM Plex Mono",ui-monospace,monospace;letter-spacing:.02em;
  }
  .art__disclaimer b{color:var(--ink-mid);font-weight:700}

  /* footer — 라이트 */
  footer{border-top:1px solid var(--line);padding:36px 0 calc(28px + env(safe-area-inset-bottom));margin-top:32px;color:var(--ink-mute);background:var(--bg-2)}
  .footer__inner{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.04em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .footer__inner a{color:var(--ink-mid);font-weight:600}
  .footer__inner a:hover{color:var(--ink)}

  @media (min-width:768px){
    article{padding:48px 0 80px}
    .art__title{margin-top:22px}
    .art__lead{font-size:21px;margin-top:32px}
    .art__summary p{font-size:18px}
  }
</style>
</head>

<article class="wrap <!-- BLOCK:A_CAT_CLASS -->is-stock<!-- /BLOCK:A_CAT_CLASS -->">

  <div class="art__meta">

    <span>·</span>
    <span class="src-dot"><i class="<!-- BLOCK:A_SRC_DOT -->d-press<!-- /BLOCK:A_SRC_DOT -->"></i> 원본 <b><!-- BLOCK:A_SRC_NAME -->source<!-- /BLOCK:A_SRC_NAME --></b></span><!-- BLOCK:A_CONFIRMED --><!-- /BLOCK:A_CONFIRMED --><!-- BLOCK:A_SENTI --><!-- /BLOCK:A_SENTI -->
  </div>

  <p class="art__lead"><!-- BLOCK:A_LEAD -->lead<!-- /BLOCK:A_LEAD --></p>

  <div class="art__summary">
    <!-- BLOCK:A_SUMMARY --><p>summary</p><!-- /BLOCK:A_SUMMARY -->
  </div>

  <aside class="art__source">
    <div class="art__source__meta">
      <span class="art__source__label"><i class="<!-- BLOCK:A_SRC_DOT2 -->d-press<!-- /BLOCK:A_SRC_DOT2 -->"></i> ORIGINAL · <!-- BLOCK:A_SRC_LABEL_KR -->외신<!-- /BLOCK:A_SRC_LABEL_KR --></span>
      <span class="art__source__name"><!-- BLOCK:A_SRC_NAME2 -->source<!-- /BLOCK:A_SRC_NAME2 --></span>

    투자 결정의 책임은 본인에게 있습니다.
  </p>
